name: Build cs2_webradar

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-${{ hashFiles('usermode/vcpkg.json', 'usermode/vcpkg-configuration.json') }}

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:/vcpkg --depth=1
          C:/vcpkg/bootstrap-vcpkg.bat -disableMetrics

      # --x-install-root legt die Pakete nach C:/vcpkg/installed/ ab (Standard-Verhalten
      # wenn vcpkg integrate install gemacht wurde). Ohne diesen Flag landen sie nur
      # in packages/, was MSBuild nicht automatisch findet.
      - name: Install dependencies via vcpkg
        working-directory: usermode
        run: |
          C:/vcpkg/vcpkg install --triplet x64-windows-static `
            --x-install-root=C:/vcpkg/installed

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Inject vcpkg paths via Directory.Build.props
        working-directory: usermode
        run: |
          $inc = "C:/vcpkg/installed/x64-windows-static/include"
          $lib = "C:/vcpkg/installed/x64-windows-static/lib"
          Set-Content Directory.Build.props @"
          <Project>
            <PropertyGroup>
              <IncludePath>$inc;`$(IncludePath)</IncludePath>
              <LibraryPath>$lib;`$(LibraryPath)</LibraryPath>
            </PropertyGroup>
          </Project>
          "@

      - name: Build (release|x64)
        working-directory: usermode
        run: |
          msbuild cs2_webradar.sln `
            /p:Configuration=release `
            /p:Platform=x64 `
            /m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cs2_webradar-dll
          path: |
            usermode/release/*.dll
            usermode/x64/release/*.dll
          if-no-files-found: warn
