name: Build cs2_webradar

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/packages
          key: vcpkg-${{ hashFiles('usermode/vcpkg.json', 'usermode/vcpkg-configuration.json') }}

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:/vcpkg --depth=1
          C:/vcpkg/bootstrap-vcpkg.bat -disableMetrics
          echo "VCPKG_ROOT=C:/vcpkg" >> $env:GITHUB_ENV

      - name: Install dependencies via vcpkg
        working-directory: usermode
        run: |
          C:/vcpkg/vcpkg install --triplet x64-windows-static

      # INCLUDE und LIB sind Standard-Umgebungsvariablen die CL.exe automatisch liest.
      # So werden die vcpkg-Pfade zu den bestehenden .vcxproj-Pfaden hinzugefügt,
      # ohne sie zu überschreiben.
      - name: Add vcpkg paths to compiler environment
        run: |
          $vcpkg_inc = "C:/vcpkg/installed/x64-windows-static/include"
          $vcpkg_lib = "C:/vcpkg/installed/x64-windows-static/lib"
          echo "INCLUDE=$vcpkg_inc;$env:INCLUDE" >> $env:GITHUB_ENV
          echo "LIB=$vcpkg_lib;$env:LIB"         >> $env:GITHUB_ENV

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build (release|x64)
        working-directory: usermode
        run: |
          msbuild cs2_webradar.sln `
            /p:Configuration=release `
            /p:Platform=x64 `
            /m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cs2_webradar-dll
          path: |
            usermode/release/*.dll
            usermode/x64/release/*.dll
          if-no-files-found: warn
