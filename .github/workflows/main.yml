name: Build cs2_webradar
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: C:/vcpkg/installed
          key: vcpkg-${{ hashFiles('usermode/vcpkg.json', 'usermode/vcpkg-configuration.json') }}

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:/vcpkg --depth=1
          C:/vcpkg/bootstrap-vcpkg.bat -disableMetrics
          C:/vcpkg/vcpkg integrate install

      - name: Install dependencies via vcpkg
        working-directory: usermode
        run: |
          C:/vcpkg/vcpkg install --triplet x64-windows-static `
            --x-install-root=C:/vcpkg/installed

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Write Directory.Build.props
        working-directory: usermode
        run: |
          Set-Content Directory.Build.props @"
          <Project>
            <PropertyGroup>
              <IncludePath>C:/vcpkg/installed/x64-windows-static/include;`$(IncludePath)</IncludePath>
            </PropertyGroup>
            <ItemDefinitionGroup>
              <Link>
                <AdditionalLibraryDirectories>C:/vcpkg/installed/x64-windows-static/lib;%(AdditionalLibraryDirectories)</AdditionalLibraryDirectories>
              </Link>
            </ItemDefinitionGroup>
          </Project>
          "@

      - name: Build (release|x64)
        working-directory: usermode
        run: |
          msbuild cs2_webradar.sln `
            /p:Configuration=release `
            /p:Platform=x64 `
            /m

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cs2_webradar-build
          path: |
            usermode/release/usermode.exe
            usermode/release/usermode.pdb
          if-no-files-found: error
